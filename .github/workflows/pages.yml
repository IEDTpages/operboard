name: Refresh data and deploy dashboard

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/current.json"
  workflow_dispatch:
  schedule:
    # Every hour at minute 17. GitHub Actions schedules use UTC.
    - cron: "17 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "operboard-pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Chromium for rendered web sources
        run: python -m playwright install --with-deps chromium

      - name: Refresh dashboard data
        # There are 11 sources. Refuse to publish a silent PBIX fallback when
        # fewer than four web sources can actually be read.
        run: python refresh_data.py --min-success 4

      - name: Validate generated JSON and print refresh summary
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool data/current.json > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("data/current.json").read_text(encoding="utf-8"))
          print(json.dumps(payload.get("refresh_summary", {}), ensure_ascii=False, indent=2))
          assert payload.get("source_mode") == "web_refresh", "No web data was loaded"
          PY

      - name: Preserve refreshed JSON
        run: cp data/current.json /tmp/operboard-current.json

      - name: Save refreshed data in repository
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} of 3"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/operboard-current.json data/current.json
            git add data/current.json

            if git diff --cached --quiet; then
              echo "Dashboard data has not changed."
              break
            fi

            git commit -m "chore: refresh dashboard data [skip ci]"
            if git push origin HEAD:main; then
              echo "Dashboard data successfully pushed."
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Unable to push refreshed data after three attempts."
              exit 1
            fi
            sleep $((attempt * 3))
          done

          # The working tree was reset during synchronization. Restore the
          # exact JSON generated in this run for the Pages artifact.
          cp /tmp/operboard-current.json data/current.json

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/data
          cp index.html _site/index.html
          cp data/current.json _site/data/current.json
          cp data/snapshot.json _site/data/snapshot.json
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
